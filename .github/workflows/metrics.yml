name: Metrics

on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch: {}
  push: {branches: ["main", "master"]}

jobs:
  # ==================== JOB 1 ====================
  metrics-job1:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: PhantomPixel-0418
          template: classic
          base: header, activity, community
          config_timezone: Asia/Shanghai
          filename: metrics.job1.svg

          # 插件参数必须加 plugin_ 前缀
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_recent_days: 30
          plugin_languages_details: percentage

          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_days: 7
          plugin_wakatime_sections: time, projects, languages, editors, os
          plugin_wakatime_limit: 4

          plugin_music: yes
          plugin_music_provider: lastfm
          plugin_music_token: ${{ secrets.LASTFM_API_KEY }}
          plugin_music_user: ${{ secrets.LASTFM_USERNAME }}
          plugin_music_mode: recent
          plugin_music_limit: 4

          plugin_achievements: yes
          achievements_limit: 6   # 这个参数在有效列表中不带 plugin_ 前缀（特例）
          # 可选： achievements_threshold: B

      - name: Fix commit author
        run: |
          git config --global user.name "PhantomPixel-0418"
          git config --global user.email "158539001+PhantomPixel-0418@users.noreply.github.com"
          git commit --amend --reset-author --no-edit
          git push --force-with-lease

  # ==================== JOB 2 ====================
  metrics-job2:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: PhantomPixel-0418
          template: classic
          base: ""
          config_timezone: Asia/Shanghai
          filename: metrics.job2.svg

          plugin_introduction: yes
          introduction_title: yes   # 这个参数不带 plugin_ 前缀（有效）

          plugin_people: yes
          people_limit: 24
          people_size: 28
          people_types: followers, following

          plugin_reactions: yes
          reactions_limit: 200
          reactions_days: 14

          plugin_discussions: yes
          discussions_limit: 4
          discussions_categories: announcements, ideas, q-a, general

          plugin_activity: yes
          activity_limit: 5
          activity_days: 14
          activity_filter: issue, pr, review, comment, push

      - name: Fix commit author
        run: |
          git config --global user.name "PhantomPixel-0418"
          git config --global user.email "158539001+PhantomPixel-0418@users.noreply.github.com"
          git commit --amend --reset-author --no-edit
          git push --force-with-lease

  # ==================== JOB 3 ====================
  metrics-job3:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: PhantomPixel-0418
          template: classic
          base: ""
          config_timezone: Asia/Shanghai
          filename: metrics.job3.svg

          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4

          plugin_stargazers: yes
          plugin_stargazers_charts_type: graph

          plugin_traffic: yes
          traffic_limit: 5   # 不带 plugin_ 前缀

          plugin_calendar: yes
          calendar_limit: 1

          # 使用社区插件写法（注意：plugin_community_16personalities 是有效的）
          plugin_community_16personalities: yes
          plugin_community_16personalities_type: "ENFJ"

      - name: Fix commit author
        run: |
          git config --global user.name "PhantomPixel-0418"
          git config --global user.email "158539001+PhantomPixel-0418@users.noreply.github.com"
          git commit --amend --reset-author --no-edit
          git push --force-with-lease