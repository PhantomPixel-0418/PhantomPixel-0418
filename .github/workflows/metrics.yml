name: Metrics

on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch: {}
  push: {branches: ["main", "master"]}

jobs:
  # ==================== JOB 1 ====================
  metrics-job1:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: PhantomPixel-0418
          template: classic
          base: header, activity, community
          config_timezone: Asia/Shanghai
          filename: metrics.job1.svg

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_recent_days: 30
          plugin_languages_details: percentage

          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_days: 7
          plugin_wakatime_sections: time, projects, languages, editors, os
          plugin_wakatime_limit: 4

          plugin_music: yes
          plugin_music_provider: lastfm
          plugin_music_token: ${{ secrets.LASTFM_API_KEY }}
          plugin_music_user: ${{ secrets.LASTFM_USERNAME }}
          plugin_music_mode: recent
          plugin_music_limit: 4

  # ==================== JOB 2 ====================
  metrics-job2:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: PhantomPixel-0418
          template: classic
          base: ""
          config_timezone: Asia/Shanghai
          filename: metrics.job2.svg

          plugin_introduction: yes
          plugin_introduction_title: yes

          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 28
          plugin_people_types: followers, following

          plugin_reactions: yes
          plugin_reactions_limit: 200
          plugin_reactions_days: 14

          plugin_discussions: yes
          plugin_discussions_limit: 4
          plugin_discussions_categories: announcements, ideas, q-a, general

  # ==================== JOB 3 ====================
  metrics-job3:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: PhantomPixel-0418
          template: classic
          base: ""
          config_timezone: Asia/Shanghai
          filename: metrics.job3.svg

          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4

          plugin_traffic: yes
          plugin_traffic_limit: 5

          plugin_calendar: yes
          plugin_calendar_limit: 1